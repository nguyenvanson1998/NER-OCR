<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NER OCR Demo</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f7f9;
      color: #1f2933;
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; }
    header {
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      border-bottom: 1px solid #dde3ea;
      background: #ffffff;
    }
    h1 { margin: 0; font-size: 18px; font-weight: 700; }
    main { display: grid; grid-template-columns: 360px 1fr; min-height: calc(100vh - 64px); }
    aside { padding: 22px; border-right: 1px solid #dde3ea; background: #ffffff; }
    section { padding: 22px; overflow: auto; }
    .upload {
      display: grid;
      gap: 14px;
      padding: 18px;
      border: 1px dashed #9aa8b6;
      border-radius: 8px;
      background: #fbfcfd;
    }
    input[type="file"] { width: 100%; }
    button {
      height: 40px;
      border: 0;
      border-radius: 6px;
      background: #135cc8;
      color: white;
      font-weight: 650;
      cursor: pointer;
    }
    button:disabled { background: #8ba7ca; cursor: progress; }
    .meta { margin-top: 18px; display: grid; gap: 10px; font-size: 13px; color: #52616f; }
    .tabs { display: flex; gap: 8px; margin-bottom: 18px; }
    .tab {
      border: 1px solid #ccd6e0;
      background: #ffffff;
      color: #263747;
      min-width: 132px;
    }
    .tab.active { border-color: #135cc8; color: #135cc8; box-shadow: inset 0 -2px 0 #135cc8; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; }
    .field {
      min-height: 112px;
      padding: 14px;
      border: 1px solid #dde3ea;
      border-radius: 8px;
      background: #ffffff;
    }
    .label { font-size: 12px; font-weight: 700; color: #52616f; text-transform: uppercase; }
    .value { margin-top: 8px; font-size: 15px; line-height: 1.45; white-space: pre-wrap; }
    .evidence { margin-top: 10px; font-size: 12px; color: #64748b; line-height: 1.4; }
    .panel { margin-top: 18px; }
    .panel h2 { font-size: 16px; margin: 0 0 10px; }
    pre {
      max-height: 380px;
      overflow: auto;
      padding: 14px;
      border: 1px solid #dde3ea;
      border-radius: 8px;
      background: #0f172a;
      color: #e2e8f0;
      white-space: pre-wrap;
      line-height: 1.45;
    }
    .error { color: #b42318; font-weight: 650; }
    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; }
      aside { border-right: 0; border-bottom: 1px solid #dde3ea; }
    }
  </style>
</head>
<body>
  <header>
    <h1>NER OCR Demo</h1>
    <span id="status">Sẵn sàng</span>
  </header>
  <main>
    <aside>
      <form class="upload" id="uploadForm">
        <strong>Upload tài liệu</strong>
        <input id="fileInput" type="file" name="file" accept=".pdf,.png,.jpg,.jpeg,.tif,.tiff,.bmp,.webp,.doc,.docx,.html,.htm,.txt" required />
        <button id="submitBtn" type="submit">OCR và trích xuất</button>
      </form>
      <div class="meta" id="meta"></div>
    </aside>
    <section>
      <div class="tabs">
        <button class="tab active" id="workTab" type="button">Chi tiết công việc</button>
        <button class="tab" id="contractTab" type="button">Hợp đồng</button>
      </div>
      <div id="result" class="grid"></div>
      <div class="panel">
        <h2>Thông tin mặc định</h2>
        <pre id="generic">{}</pre>
      </div>
      <div class="panel">
        <h2>OCR text</h2>
        <pre id="ocrText"></pre>
      </div>
    </section>
  </main>
  <script>
    const form = document.getElementById("uploadForm");
    const fileInput = document.getElementById("fileInput");
    const submitBtn = document.getElementById("submitBtn");
    const statusEl = document.getElementById("status");
    const resultEl = document.getElementById("result");
    const genericEl = document.getElementById("generic");
    const ocrTextEl = document.getElementById("ocrText");
    const metaEl = document.getElementById("meta");
    const workTab = document.getElementById("workTab");
    const contractTab = document.getElementById("contractTab");
    let lastData = null;

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      if (!fileInput.files.length) return;
      submitBtn.disabled = true;
      statusEl.textContent = "Đang OCR...";
      resultEl.innerHTML = "";
      genericEl.textContent = "{}";
      ocrTextEl.textContent = "";
      metaEl.innerHTML = "";

      const body = new FormData();
      body.append("file", fileInput.files[0]);
      try {
        const response = await fetch("/api/ocr/extract", { method: "POST", body });
        const data = await response.json();
        if (!response.ok) throw new Error(data.detail || "Có lỗi khi xử lý file.");
        lastData = data;
        render(data);
      } catch (error) {
        statusEl.innerHTML = `<span class="error">${error.message}</span>`;
      } finally {
        submitBtn.disabled = false;
      }
    });

    workTab.addEventListener("click", () => setActive("work_detail"));
    contractTab.addEventListener("click", () => setActive("contract"));

    function render(data) {
      const extraction = data.extraction;
      statusEl.textContent = extraction.document_type_label;
      metaEl.innerHTML = `
        <div><strong>File:</strong> ${escapeHtml(data.file.name)}</div>
        <div><strong>LLM:</strong> ${escapeHtml(data.llm.provider)} ${escapeHtml(data.llm.model || "")}</div>
        <div><strong>Màn detect:</strong> ${escapeHtml(extraction.screen)}</div>
      `;
      genericEl.textContent = JSON.stringify(extraction.generic_extraction, null, 2);
      ocrTextEl.textContent = data.ocr.text;
      setActive(extraction.screen);
    }

    function setActive(screen) {
      if (!lastData) return;
      workTab.classList.toggle("active", screen === "work_detail");
      contractTab.classList.toggle("active", screen === "contract");
      const fields = lastData.extraction.screen === screen ? lastData.extraction.fields : {};
      resultEl.innerHTML = Object.entries(fields).map(([key, field]) => `
        <article class="field">
          <div class="label">${escapeHtml(field.label || key)}</div>
          <div class="value">${escapeHtml(field.value || "Không có thông tin")}</div>
          ${field.evidence ? `<div class="evidence">${escapeHtml(field.evidence)}</div>` : ""}
        </article>
      `).join("") || `<article class="field"><div class="value">Tài liệu này không thuộc màn đang chọn.</div></article>`;
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }
  </script>
</body>
</html>
